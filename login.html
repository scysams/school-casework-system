<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系統登入 - 學校訓導及輔導管理系統</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f4f7f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-container {
            background-color: #fff;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 1rem;
            box-sizing: border-box; /* 確保 padding 不會影響寬度 */
        }
        .login-button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 4px;
            background-color: #3498db;
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        .login-button:hover {
            background-color: #2980b9;
        }
        .error-message {
            color: #c0392b;
            margin-top: 15px;
            display: none; /* 預設隱藏 */
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>訓導及輔導管理系統登入</h1>
        <form id="login-form">
            <div class="form-group">
                <label for="username">用戶名 / 電郵</label>
                <input type="text" id="username" name="username" required>
            </div>
            <div class="form-group">
                <label for="password">密碼</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit" class="login-button">登入</button>
            <p id="error-message" class="error-message">用戶名或密碼錯誤！</p>
        </form>
    </div>

    <script>
        // 這段 JavaScript 模擬一個假的登入過程
        document.getElementById('login-form').addEventListener('submit', function(event) {
            event.preventDefault(); // 阻止表單預設的提交和頁面刷新

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMessage = document.getElementById('error-message');

            // *** 這是「假」的驗證邏輯，未來會被後端伺服器取代 ***
            // 我們硬性規定一組正確的帳號密碼來做為原型展示
            if (username === 'admin' && password === '12345') {
                // 如果成功，就跳轉到主管理頁面
                alert('登入成功！正在跳轉至管理頁面...');
                window.location.href = 'index.html'; // 跳轉到您的主頁
            } else {
                // 如果失敗，就顯示錯誤訊息
                errorMessage.style.display = 'block';
            }
        });
    </script>
</body>
</html>
