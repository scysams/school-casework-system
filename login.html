<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系統登入 - 校本諮詢平台</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f4f7f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-container { background-color: #fff; padding: 40px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1); width: 100%; max-width: 400px; text-align: center; }
        h1 { color: #2c3e50; margin-bottom: 10px; }
        p.subtitle { color: #7f8c8d; margin-bottom: 30px; font-size: 0.9rem; }
        .form-group { margin-bottom: 20px; text-align: left; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 600; color: #333;}
        .form-group input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 4px; font-size: 1rem; box-sizing: border-box; }
        .login-button { width: 100%; padding: 12px; border: none; border-radius: 4px; background-color: #3498db; color: white; font-size: 1.1rem; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .login-button:hover { background-color: #2980b9; }
        .error-message { color: #c0392b; margin-top: 15px; display: none; font-weight: bold;}
    </style>
</head>
<body>
    <div class="login-container">
        <h1>校本諮詢平台</h1>
        <p class="subtitle">香海正覺蓮社佛教正覺蓮社學校</p>
        <form id="login-form">
            <div class="form-group">
                <label for="username">登入帳號 / 電郵</label>
                <input type="text" id="username" placeholder="請輸入帳號" required>
            </div>
            <div class="form-group">
                <label for="password">密碼</label>
                <input type="password" id="password" placeholder="請輸入密碼" required>
            </div>
            <button type="submit" class="login-button">登入系統</button>
            <p id="error-message" class="error-message">帳號或密碼錯誤！請重新輸入。</p>
        </form>
    </div>

    <script>
        // 定義系統中的 5 個有效帳號與其權限
        const authorizedUsers = {
            // 管理員帳號 (全部權限)
            "fanny@bcklas.edu.hk":   { password: "Bcklas12345", role: "admin", name: "校長" },
            "csysams@bcklas.edu.hk": { password: "Bcklas12345", role: "admin", name: "陳副校長" },
            "scysams@bcklas.edu.hk": { password: "Bcklas12345", role: "admin", name: "蘇老師" },
            
            // 同工帳號 (部分權限：只能看自己的)
            // 為了方便登入，設定簡單的帳號名稱 yeung 和 leung
            "yeung": { password: "Bck54321", role: "caseworker", name: "楊姑娘" },
            "leung": { password: "Bck12345", role: "caseworker", name: "梁姑娘" }
        };

        document.getElementById('login-form').addEventListener('submit', function(event) {
            event.preventDefault(); 
            const usernameInput = document.getElementById('username').value.trim();
            const passwordInput = document.getElementById('password').value;
            const errorMessage = document.getElementById('error-message');

            const user = authorizedUsers[usernameInput];

            // 驗證密碼
            if (user && user.password === passwordInput) {
                // 登入成功！將使用者的身份資訊存入 Session Storage (當下瀏覽器分頁的暫存)
                const userInfo = {
                    account: usernameInput,
                    role: user.role,
                    name: user.name
                };
                sessionStorage.setItem('currentUser', JSON.stringify(userInfo));
                
                // 跳轉到主畫面
                window.location.href = 'index.html'; 
            } else {
                errorMessage.style.display = 'block';
            }
        });
    </script>
</body>
</html>
