<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>學校訓導及輔導管理系統 (最終完整版)</title>
    
    <!-- 引入 Chart.js 函式庫 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        /* --- 全局樣式 --- */
        :root {
            --primary-color: #3498db;
            --primary-hover-color: #2980b9;
            --danger-color: #c0392b;
            --danger-hover-color: #a93226;
            --success-color: #27ae60;
            --success-hover-color: #229954;
            --secondary-color: #95a5a6;
            --secondary-hover-color: #7f8c8d;
            --light-bg-color: #f4f7f9;
            --white-color: #fff;
            --dark-text-color: #2c3e50;
            --light-text-color: #333;
            --border-color: #ccc;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--light-bg-color);
            color: var(--light-text-color);
            margin: 0;
            padding: 20px;
        }

        /* --- 容器樣式 --- */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background-color: var(--white-color);
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        }

        /* --- 標題樣式 --- */
        h1, h2, h3 {
            color: var(--dark-text-color);
            border-bottom: 2px solid #e0e0e0;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        /* --- 統計儀表板樣式 --- */
        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-box {
            background-color: var(--white-color);
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.08);
        }
        .stat-box h3 {
            margin-top: 0;
            border-bottom: 1px solid #eee;
        }
        .chart-wrapper {
            height: 250px;
            margin-bottom: 20px;
        }
        .stats-table {
            width: 100%;
            border-collapse: collapse;
        }
        .stats-table td {
            padding: 8px 4px;
            border-bottom: 1px solid #f0f0f0;
        }
        .stats-table tr:last-child td {
            border-bottom: none;
        }
        .stats-table td:last-child {
            text-align: right;
            font-weight: 700;
            color: var(--primary-color);
        }

        /* --- 篩選器樣式 --- */
        .filter-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 20px;
            padding: 15px;
            background-color: #f8f9fa;
            border-radius: 6px;
        }
        .filter-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .filter-group label { font-weight: 600; }
        .filter-group select {
            padding: 8px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 0.9rem;
        }
        
        /* --- 表單樣式 --- */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .form-group { display: flex; flex-direction: column; }
        .form-group label { margin-bottom: 5px; font-weight: 600; }
        .form-group input, .form-group select {
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 1rem;
        }
        .form-group input.invalid { border-color: var(--danger-color); background-color: #fdeaea; }
        .form-actions {
            grid-column: 1 / -1;
            text-align: right;
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        /* --- 按鈕通用樣式 --- */
        .button {
            padding: 12px 25px;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s ease;
            color: white;
        }
        .submit-button { background-color: var(--primary-color); }
        .submit-button:hover { background-color: var(--primary-hover-color); }
        .cancel-button { background-color: var(--secondary-color); }
        .cancel-button:hover { background-color: var(--secondary-hover-color); }
        .edit-btn { background-color: var(--success-color); }
        .edit-btn:hover { background-color: var(--success-hover-color); }
        .delete-btn { background-color: var(--danger-color); }
        .delete-btn:hover { background-color: var(--danger-hover-color); }
        
        /* --- 表格樣式 --- */
        .table-wrapper { overflow-x: auto; }
        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        .data-table th, .data-table td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: left;
            white-space: nowrap;
        }
        .data-table th { background-color: #f2f2f2; font-weight: 700; }
        .data-table td .button { padding: 5px 10px; margin-right: 5px; }
    </style>
</head>
<body>

    <div class="container">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h1 id="main-title" style="border-bottom: none;">學校訓導及輔導管理系統</h1>
            <a href="login.html" id="logout-link" style="text-decoration: none; color: #3498db; font-weight: 600; white-space: nowrap;">登出</a>
        </div>
        
        <div class="stats-container">
            <div class="stat-box">
                <h3>按負責同工統計</h3>
                <div class="chart-wrapper">
                    <canvas id="caseworkerChart"></canvas>
                </div>
                <table class="stats-table">
                    <thead><tr><th>負責同工</th><th>個案數量</th></tr></thead>
                    <tbody id="caseworker-stats-body"></tbody>
                </table>
            </div>
            <div class="stat-box">
                <h3>按班級統計</h3>
                <div class="chart-wrapper">
                    <canvas id="classChart"></canvas>
                </div>
                <table class="stats-table">
                    <thead><tr><th>班級</th><th>個案數量</th></tr></thead>
                    <tbody id="class-stats-body"></tbody>
                </table>
            </div>
        </div>
        
        <form id="case-form">
            <h2 id="form-title">新增個案</h2>
            <div class="form-grid">
                <input type="hidden" id="case-id" name="case-id">
                <div class="form-group"><label for="student-name">學生姓名</label><input type="text" id="student-name" name="student-name" required></div>
                <div class="form-group"><label for="file-number">檔案編號</label><input type="text" id="file-number" name="file-number"></div>
                <div class="form-group"><label for="open-date">開案日期</label><input type="date" id="open-date" name="open-date" required></div>
                <div class="form-group"><label for="gender">性別</label><select id="gender" name="gender"><option value="male">男</option><option value="female">女</option></select></div>
                <div class="form-group"><label for="class-current">現時班級</label><input type="text" id="class-current" name="class-current"></div>
                <div class="form-group"><label for="dob">學生出生日期</label><input type="date" id="dob" name="dob"></div>
                <div class="form-group"><label for="caseworker">負責個案同工</label><input type="text" id="caseworker" name="caseworker" required></div>
                <div class="form-group"><label for="primary-issue">主要問題</label><input type="text" id="primary-issue" name="primary-issue"></div>
                <div class="form-group"><label for="secondary-issue">次要問題</label><input type="text" id="secondary-issue" name="secondary-issue"></div>
                <div class="form-actions">
                    <button type="submit" class="button submit-button" id="submit-btn">提交新個案</button>
                    <button type="button" class="button cancel-button" id="cancel-btn" style="display: none;">取消編輯</button>
                </div>
            </div>
        </form>

        <h2>個案總表</h2>
        <div class="filter-container">
            <div class="filter-group"><label for="class-filter">按班級篩選：</label><select id="class-filter"><option value="">-- 所有班級 --</option></select></div>
            <div class="filter-group"><label for="caseworker-filter">按同工篩選：</label><select id="caseworker-filter"><option value="">-- 所有同工 --</option></select></div>
        </div>
        <div class="table-wrapper">
            <table class="data-table">
                <thead>
                    <tr><th>學生姓名</th><th>檔案編號</th><th>開案日期</th><th>性別</th><th>現時班級</th><th>負責個案同工</th><th>主要問題</th><th>次要問題</th><th>操作</th></tr>
                </thead>
                <tbody id="case-table-body">
                    <tr data-case-id="1" data-dob="2014-05-10" data-secondary-issue="動力不足"><td>陳小明</td><td>CS-001</td><td>2026-04-20</td><td>男</td><td>P.6A</td><td>楊姑娘</td><td>學業壓力</td><td>動力不足</td><td><button class="button edit-btn">編輯</button><button class="button delete-btn">刪除</button></td></tr>
                    <tr data-case-id="2" data-dob="2016-08-15" data-secondary-issue="社交退縮"><td>李靜兒</td><td>CS-002</td><td>2026-04-22</td><td>女</td><td>P.4C</td><td>梁姑娘</td><td>情緒困擾</td><td>社交退縮</td><td><button class="button edit-btn">編輯</button><button class="button delete-btn">刪除</button></td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // --- DOM 元素 ---
            const form = document.getElementById('case-form');
            const formTitle = document.getElementById('form-title');
            const tableBody = document.getElementById('case-table-body');
            const submitBtn = document.getElementById('submit-btn');
            const cancelBtn = document.getElementById('cancel-btn');
            const caseIdInput = document.getElementById('case-id');
            const classFilter = document.getElementById('class-filter');
            const caseworkerFilter = document.getElementById('caseworker-filter');
            const caseworkerStatsBody = document.getElementById('caseworker-stats-body');
            const classStatsBody = document.getElementById('class-stats-body');

            // --- Chart.js 實例變數 ---
            let caseworkerChartInstance = null;
            let classChartInstance = null;

            // --- 事件監聽 ---
            form.addEventListener('submit', handleFormSubmit);
            tableBody.addEventListener('click', handleTableClick);
            cancelBtn.addEventListener('click', resetForm);
            classFilter.addEventListener('change', updateAll);
            caseworkerFilter.addEventListener('change', updateAll);

            // --- 核心函數 ---
            function handleFormSubmit(event) {
                event.preventDefault();
                if (!validateForm()) {
                    alert('請填寫所有必填欄位！');
                    return;
                }
                const caseId = caseIdInput.value;
                if (caseId) { // 編輯模式
                    const rowToUpdate = tableBody.querySelector(`tr[data-case-id="${caseId}"]`);
                    if (rowToUpdate) updateRowFromForm(rowToUpdate);
                } else { // 新增模式
                    const newRow = createRowFromForm();
                    tableBody.appendChild(newRow);
                }
                resetForm();
                updateAll();
            }

            function handleTableClick(event) {
                const target = event.target;
                const row = target.closest('tr');
                if (!row) return;
                if (target.classList.contains('delete-btn')) {
                    const studentName = row.cells[0].textContent;
                    if (confirm(`您確定要刪除「${studentName}」的個案記錄嗎？`)) {
                        row.remove();
                        updateAll();
                    }
                }
                if (target.classList.contains('edit-btn')) {
                    switchToEditMode(row);
                }
            }
            
            function updateAll() {
                applyFilters();
                updateFilterOptions();
                updateStatistics();
            }

            function updateStatistics() {
                const rows = Array.from(tableBody.querySelectorAll('tr'));
                const caseworkerCounts = {};
                const classCounts = {};

                rows.forEach(row => {
                    if (row.style.display !== 'none') {
                        const className = row.cells[4].textContent;
                        const caseworkerName = row.cells[5].textContent;
                        if (caseworkerName) caseworkerCounts[caseworkerName] = (caseworkerCounts[caseworkerName] || 0) + 1;
                        if (className) classCounts[className] = (classCounts[className] || 0) + 1;
                    }
                });

                // 渲染同工統計
                caseworkerChartInstance = drawOrUpdateChart(caseworkerChartInstance, 'caseworkerChart', Object.keys(caseworkerCounts), Object.values(caseworkerCounts), 'rgba(52, 152, 219, 0.7)');
                caseworkerStatsBody.innerHTML = '';
                for (const name in caseworkerCounts) {
                    caseworkerStatsBody.innerHTML += `<tr><td>${name}</td><td>${caseworkerCounts[name]}</td></tr>`;
                }

                // 渲染班級統計
                classChartInstance = drawOrUpdateChart(classChartInstance, 'classChart', Object.keys(classCounts), Object.values(classCounts), 'rgba(46, 204, 113, 0.7)');
                classStatsBody.innerHTML = '';
                for (const name in classCounts) {
                    classStatsBody.innerHTML += `<tr><td>${name}</td><td>${classCounts[name]}</td></tr>`;
                }
            }

            function drawOrUpdateChart(instance, canvasId, labels, data, color) {
                const ctx = document.getElementById(canvasId).getContext('2d');
                if (instance) {
                    instance.data.labels = labels;
                    instance.data.datasets[0].data = data;
                    instance.update();
                } else {
                    instance = new Chart(ctx, {
                        type: 'bar',
                        data: {
                            labels: labels,
                            datasets: [{ label: '個案數量', data: data, backgroundColor: color, borderWidth: 1 }]
                        },
                        options: {
                            scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } },
                            responsive: true,
                            maintainAspectRatio: false
                        }
                    });
                }
                return instance;
            }

            function applyFilters() {
                const classValue = classFilter.value;
                const caseworkerValue = caseworkerFilter.value;
                tableBody.querySelectorAll('tr').forEach(row => {
                    const classMatch = !classValue || row.cells[4].textContent === classValue;
                    const caseworkerMatch = !caseworkerValue || row.cells[5].textContent === caseworkerValue;
                    row.style.display = (classMatch && caseworkerMatch) ? '' : 'none';
                });
            }

            function updateFilterOptions() {
                const classes = new Set();
                const caseworkers = new Set();
                tableBody.querySelectorAll('tr').forEach(row => {
                    classes.add(row.cells[4].textContent);
                    caseworkers.add(row.cells[5].textContent);
                });
                
                const currentClassFilterValue = classFilter.value;
                classFilter.innerHTML = '<option value="">-- 所有班級 --</option>';
                classes.forEach(c => { if (c) classFilter.innerHTML += `<option value="${c}">${c}</option>`; });
                classFilter.value = currentClassFilterValue;

                const currentCaseworkerFilterValue = caseworkerFilter.value;
                caseworkerFilter.innerHTML = '<option value="">-- 所有同工 --</option>';
                caseworkers.forEach(cw => { if (cw) caseworkerFilter.innerHTML += `<option value="${cw}">${cw}</option>`; });
                caseworkerFilter.value = currentCaseworkerFilterValue;
            }

            function validateForm() {
                let isValid = true;
                form.querySelectorAll('input[required]').forEach(input => {
                    if (!input.value.trim()) { isValid = false; input.classList.add('invalid'); } 
                    else { input.classList.remove('invalid'); }
                });
                return isValid;
            }

            function createRowFromForm() {
                const newRow = document.createElement('tr');
                newRow.setAttribute('data-case-id', Date.now());
                updateRowFromForm(newRow);
                return newRow;
            }
            
            function updateRowFromForm(row) {
                row.setAttribute('data-dob', form.querySelector('#dob').value);
                row.setAttribute('data-secondary-issue', form.querySelector('#secondary-issue').value);
                row.innerHTML = `
                    <td>${form.querySelector('#student-name').value}</td>
                    <td>${form.querySelector('#file-number').value}</td>
                    <td>${form.querySelector('#open-date').value}</td>
                    <td>${form.querySelector('#gender').options[form.querySelector('#gender').selectedIndex].text}</td>
                    <td>${form.querySelector('#class-current').value}</td>
                    <td>${form.querySelector('#caseworker').value}</td>
                    <td>${form.querySelector('#primary-issue').value}</td>
                    <td>${form.querySelector('#secondary-issue').value}</td>
                    <td><button class="button edit-btn">編輯</button><button class="button delete-btn">刪除</button></td>
                `;
            }

            function switchToEditMode(row) {
                caseIdInput.value = row.dataset.caseId;
                form.querySelector('#student-name').value = row.cells[0].textContent;
                form.querySelector('#file-number').value = row.cells[1].textContent;
                form.querySelector('#open-date').value = row.cells[2].textContent;
                form.querySelector('#class-current').value = row.cells[4].textContent;
                form.querySelector('#caseworker').value = row.cells[5].textContent;
                form.querySelector('#primary-issue').value = row.cells[6].textContent;
                form.querySelector('#dob').value = row.dataset.dob;
                form.querySelector('#secondary-issue').value = row.dataset.secondaryIssue;
                form.querySelector('#gender').value = (row.cells[3].textContent === '男') ? 'male' : 'female';
                
                formTitle.textContent = `正在編輯：${row.cells[0].textContent}`;
                submitBtn.textContent = '更新資料';
                cancelBtn.style.display = 'inline-block';
                formTitle.scrollIntoView({ behavior: 'smooth' });
            }
            
            function resetForm() {
                form.reset();
                caseIdInput.value = '';
                formTitle.textContent = '新增個案';
                submitBtn.textContent = '提交新個案';
                cancelBtn.style.display = 'none';
                form.querySelectorAll('.invalid').forEach(el => el.classList.remove('invalid'));
            }
            
            // --- 初始載入 ---
            updateAll();
        });
    </script>
</body>
</html>
