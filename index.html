<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校本諮詢平台</title>
    
    <!-- 引入 Chart.js, SheetJS, 和 Supabase (雲端資料庫) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

    <style>
        :root { --primary-color: #3498db; --primary-hover-color: #2980b9; --sidebar-bg: #2c3e50; --sidebar-hover: #34495e; --danger-color: #c0392b; --success-color: #27ae60; --bg-color: #f4f7f9; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; background-color: var(--bg-color); }
        .sidebar { width: 200px; background-color: var(--sidebar-bg); color: white; display: flex; flex-direction: column; box-shadow: 2px 0 5px rgba(0,0,0,0.1); z-index: 10; transition: width 0.3s ease; overflow: hidden; white-space: nowrap; }
        .sidebar.collapsed { width: 0; }
        .sidebar-header { padding: 20px; font-size: 1.2rem; font-weight: bold; border-bottom: 1px solid rgba(255,255,255,0.1); text-align: center; }
        .menu-item { padding: 15px 20px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); transition: all 0.3s ease; font-size: 1.1rem; display: flex; align-items: center; gap: 10px; }
        .menu-item:hover { background-color: var(--sidebar-hover); }
        .menu-item.active { background-color: var(--sidebar-hover); border-left: 5px solid var(--primary-color); color: var(--primary-color); font-weight: bold; }
        .main-wrapper { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .top-header { background-color: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); z-index: 5; }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .toggle-btn { background: none; border: none; font-size: 1.5rem; color: #2c3e50; cursor: pointer; padding: 0; display: flex; align-items: center; justify-content: center; transition: color 0.3s; }
        .toggle-btn:hover { color: var(--primary-color); }
        .top-header h2 { margin: 0; color: #2c3e50; font-size: 1.4rem; }
        .header-right { display: flex; align-items: center; gap: 15px; }
        .school-name { font-weight: bold; color: #333; font-size: 1.1rem; }
        .logout-btn { color: var(--danger-color); text-decoration: none; font-weight: 600; font-size: 0.95rem; border: 1px solid var(--danger-color); padding: 4px 12px; border-radius: 4px; transition: 0.3s; cursor:pointer;}
        .logout-btn:hover { background-color: var(--danger-color); color: white; }
        .main-content { padding: 30px; overflow-y: auto; flex: 1; }
        .section-title { color: #2c3e50; border-bottom: 2px solid #e0e0e0; padding-bottom: 10px; margin-bottom: 20px; margin-top: 0; }
        .stats-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-box { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.08); }
        .stat-box h3 { margin-top: 0; border-bottom: 1px solid #eee; padding-bottom: 10px; font-size: 1.1rem; }
        .chart-wrapper { height: 260px; position: relative; width: 100%; margin-bottom: 10px; } 
        .form-container { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.08); margin-bottom: 30px;}
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .form-group { display: flex; flex-direction: column; transition: all 0.3s; }
        .form-group label { margin-bottom: 5px; font-weight: 600; color: #2c3e50;}
        .form-group input, .form-group select, .form-group textarea { padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 1rem; font-family: inherit; }
        .form-group textarea { resize: vertical; min-height: 80px; }
        .issue-select-group { display: flex; gap: 10px; }
        .issue-select-group select { flex: 1; }
        .form-actions { grid-column: 1 / -1; text-align: right; margin-top: 20px; }
        .table-container { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.08); }
        .filter-container { display: flex; flex-direction: column; gap: 15px; margin-bottom: 20px; padding: 15px; background-color: #f8f9fa; border-radius: 6px; }
        .filter-row { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
        .filter-left { display: flex; gap: 20px; flex-wrap: wrap; align-items: center;}
        .filter-group { display: flex; align-items: center; gap: 10px; }
        .filter-group select, .filter-group input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        .table-wrapper { overflow-x: auto; }
        .data-table { width: 100%; border-collapse: collapse; font-size: 0.95rem; }
        .data-table th, .data-table td { border: 1px solid #ddd; padding: 10px; text-align: left; word-wrap: break-word; vertical-align: top; transition: display 0.3s; }
        .data-table th { background-color: #f2f2f2; }
        .data-table th:nth-child(9), .data-table td:nth-child(9), .data-table th:nth-child(10), .data-table td:nth-child(10) { min-width: 150px; max-width: 250px; }
        .data-table th:nth-child(11), .data-table td:nth-child(11) { min-width: 200px; max-width: 300px; }
        .button { padding: 8px 16px; border: none; border-radius: 4px; font-size: 0.9rem; color: white; cursor: pointer; transition: 0.3s;}
        .submit-button { background-color: var(--primary-color); font-size: 1rem; padding: 10px 20px;}
        .cancel-button { background-color: #95a5a6; font-size: 1rem; padding: 10px 20px;}
        .edit-btn { background-color: var(--success-color); margin-right: 5px; margin-bottom: 5px;}
        .delete-btn { background-color: var(--danger-color); }
        .export-btn { background-color: #107c41; font-weight: bold; font-size: 0.95rem; display: flex; align-items: center; gap: 8px; padding: 10px 20px;}
        .export-btn:hover { background-color: #0c5e31; }
        .other-input { margin-top: 8px; background-color: #fffbc8; border-color: #f1c40f !important; }
        .user-badge { background-color: #ecf0f1; padding: 5px 15px; border-radius: 20px; font-weight: bold; color: #2c3e50; border: 1px solid #bdc3c7;}
    </style>
</head>
<body>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">系統選單</div>
        <div class="menu-item active" data-context="student">👨‍🎓 學生個案</div>
        <div class="menu-item" data-context="teacher">👩‍🏫 老師諮詢</div>
        <div class="menu-item" data-context="parent">👪 家長諮詢</div>
    </div>

    <div class="main-wrapper">
        <div class="top-header">
            <div class="header-left">
                <button class="toggle-btn" id="sidebar-toggle" title="隱藏/顯示選單">☰</button>
                <h2 id="main-title">校本諮詢平台</h2>
            </div>
            <div class="header-right">
                <span class="user-badge" id="user-badge-container" style="display:none;">您好，<span id="display-user-name"></span></span>
                <span class="school-name" style="margin: 0 10px;">香海正覺蓮社佛教正覺蓮社學校</span>
                <a href="login.html" class="logout-btn" id="logout-action-btn">登出</a>
            </div>
        </div>

        <div class="main-content">
            <!-- 統計區塊 (圖表) -->
            <div class="stats-container">
                <div class="stat-box">
                    <h3>按同工及月份統計</h3>
                    <div class="chart-wrapper"><canvas id="caseworkerChart"></canvas></div>
                </div>
                <div class="stat-box">
                    <h3 id="class-chart-title">按班級統計</h3>
                    <div class="chart-wrapper"><canvas id="classChart"></canvas></div>
                </div>
                <div class="stat-box">
                    <h3>按主要問題統計 (主類別)</h3>
                    <div class="chart-wrapper"><canvas id="issueChart"></canvas></div>
                </div>
            </div>

            <!-- 總表區塊 -->
            <div class="table-container" style="margin-bottom: 30px;">
                <h2 class="section-title" id="table-title">學生個案總表</h2>
                
                <div class="filter-container">
                    <div class="filter-row">
                        <div class="filter-left">
                            <div class="filter-group"><label id="filter-class-label">班級篩選：</label><select id="class-filter"><option value="">-- 全部 --</option></select></div>
                            <div class="filter-group" id="caseworker-filter-container"><label>同工篩選：</label><select id="caseworker-filter"><option value="">-- 所有同工 --</option></select></div>
                        </div>
                    </div>
                    <div class="filter-row" style="border-top: 1px dashed #ccc; padding-top: 15px;">
                        <div class="filter-left">
                            <div class="filter-group">
                                <label style="color: #107c41;">📅 報表範圍：</label>
                                <select id="date-range-preset">
                                    <option value="all">-- 全部日期 --</option>
                                    <option value="last2months">最近兩個月</option>
                                    <option value="thisSchoolYear">本學年 (9月起)</option>
                                    <option value="thisYear">本年度 (1月起)</option>
                                    <option value="custom">自訂日期...</option>
                                </select>
                            </div>
                            <div class="filter-group" id="custom-date-group" style="display: none;">
                                <input type="date" id="date-start"> <span>至</span> <input type="date" id="date-end">
                            </div>
                        </div>
                        <div>
                            <button id="export-excel-btn" class="button export-btn">📥 匯出 Excel 報表</button>
                        </div>
                    </div>
                </div>

                <div class="table-wrapper">
                    <table class="data-table" id="main-data-table">
                        <thead>
                            <tr>
                                <th id="th-name">姓名</th>
                                <th id="th-student-id" class="col-student-id">學生編號</th>
                                <th>記錄類別</th>
                                <th>檔案編號</th>
                                <th>日期</th>
                                <th>性別</th>
                                <th id="th-class">班級</th>
                                <th>負責同工</th>
                                <th>主要問題</th>
                                <th>次要問題</th>
                                <th>諮詢內容</th>
                                <th class="no-export">操作</th>
                            </tr>
                        </thead>
                        <tbody id="case-table-body">
                            <!-- 資料將由 Supabase 雲端載入 -->
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- 表單區塊 -->
            <div class="form-container">
                <h2 class="section-title" id="form-title">新增記錄</h2>
                <form id="case-form">
                    <input type="hidden" id="case-id" name="case-id">
                    <div class="form-grid">
                        <div class="form-group"><label id="label-name">姓名</label><input type="text" id="student-name" required></div>
                        <div class="form-group" id="group-student-id"><label id="label-student-id">學生編號</label><input type="text" id="student-id"></div>
                        <div class="form-group"><label>記錄類別</label><select id="record-type" required><option value="開檔案">開檔案</option><option value="諮詢">諮詢</option></select></div>
                        <div class="form-group"><label>檔案編號</label><input type="text" id="file-number" placeholder="如沒有可留空"></div>
                        <div class="form-group"><label>日期</label><input type="date" id="open-date" required></div>
                        <div class="form-group"><label>性別</label><select id="gender"><option value="male">男</option><option value="female">女</option></select></div>
                        <div class="form-group"><label id="label-class">現時班級</label><input type="text" id="class-current"></div>
                        <div class="form-group" id="dob-group"><label>出生日期</label><input type="date" id="dob"></div>
                        
                        <div class="form-group">
                            <label>負責同工</label>
                            <select id="caseworker" required>
                                <option value="">-- 請選擇同工 --</option>
                                <option value="楊姑娘">楊姑娘</option>
                                <option value="梁姑娘">梁姑娘</option>
                            </select>
                        </div>
                        
                        <div class="form-group" style="grid-column: 1 / -1;">
                            <label>主要問題</label>
                            <div class="issue-select-group"><select id="primary-issue-category" required><option value="">-- 主類別 --</option></select><select id="primary-issue-detail" required disabled style="flex: 2;"><option value="">-- 請先選擇主類別 --</option></select></div>
                            <input type="text" id="primary-issue-other" class="other-input" placeholder="請填寫具體的「其他」問題說明..." style="display: none;">
                        </div>
                        <div class="form-group" style="grid-column: 1 / -1;">
                            <label>次要問題</label>
                            <div class="issue-select-group"><select id="secondary-issue-category"><option value="無">無</option></select><select id="secondary-issue-detail" disabled style="flex: 2;"><option value="">-- 細項 --</option></select></div>
                            <input type="text" id="secondary-issue-other" class="other-input" placeholder="請填寫具體的「其他」問題說明..." style="display: none;">
                        </div>
                        <div class="form-group" style="grid-column: 1 / -1;">
                            <label>諮詢內容</label>
                            <textarea id="consultation-content" rows="3" placeholder="請輸入詳細的面談或諮詢記錄..."></textarea>
                        </div>
                        <div class="form-actions">
                            <button type="submit" class="button submit-button" id="submit-btn">提交資料</button>
                            <button type="button" class="button cancel-button" id="cancel-btn" style="display: none;">取消編輯</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        // =========================================================================
        // 💡【請在這裡貼上您的鑰匙】💡
        // =========================================================================
        const SUPABASE_URL = 'https://rlijmzjzimomrhjjzfwo.supabase.co/rest/v1/'; 
        const SUPABASE_ANON_KEY = 'sb_publishable_G-B3LjpunUDH0bNpJyj2Aw_NSRq4mWX'; 
        // =========================================================================

        const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        document.addEventListener('DOMContentLoaded', function() {
            
            // 提醒填寫 Key
            if(SUPABASE_URL === 'YOUR_SUPABASE_URL') {
                alert('系統提示：請在 VS Code 裡將 index.html 底部的 URL 和 Key 換成您專屬的密碼，否則無法連接雲端庫！');
            }

            // --- 權限邏輯 ---
            let currentUser = { role: 'admin', name: '測試員' };
            try {
                const sessionStr = sessionStorage.getItem('currentUser');
                if (sessionStr) {
                    currentUser = JSON.parse(sessionStr);
                    document.getElementById('display-user-name').textContent = currentUser.name;
                    document.getElementById('user-badge-container').style.display = 'inline-block';
                }
            } catch(e) {}

            document.getElementById('logout-action-btn').addEventListener('click', function(e) {
                e.preventDefault();
                sessionStorage.removeItem('currentUser');
                window.location.href = 'login.html';
            });

            function enforcePermissions() {
                const cwSelect = document.getElementById('caseworker');
                const cwFilterContainer = document.getElementById('caseworker-filter-container');
                if (currentUser.role === 'caseworker') {
                    cwSelect.value = currentUser.name;
                    cwSelect.disabled = true; 
                    if(cwFilterContainer) cwFilterContainer.style.display = 'none';
                } else {
                    cwSelect.disabled = false;
                    if(cwFilterContainer) cwFilterContainer.style.display = 'flex';
                }
            }

            // 側邊欄
            const sidebarToggleBtn = document.getElementById('sidebar-toggle');
            const sidebar = document.getElementById('sidebar');
            if (sidebarToggleBtn && sidebar) {
                sidebarToggleBtn.addEventListener('click', function() {
                    sidebar.classList.toggle('collapsed');
                    setTimeout(() => updateStatistics(), 300);
                });
            }

            const issueData = {
                "學業": ["LL1: 經診斷為有學習困難", "LL2: 懷疑為有學習困難", "LL3: 學習興趣/動機低弱", "LL4: 學習技巧不足", "LL5: 未能適應本地教育制度", "LL6: 其他（請扼要說明）"],
                "行為": ["CC1: 校服儀容不符合校規", "CC2: 攜帶違反校規的物品回校", "CC3: 不誠實的行為", "CC4: 經常遲到", "CC5: 經常逃學", "CC6: 校內騷擾他人行為", "CC7: 對師長使用暴力", "CC8: 與同學打架", "CC9: 欺凌同學（暴力）", "CC10: 欺凌同學（語言或間接）", "CC11: 網絡欺凌", "CC12: 惡意破壞校舍", "CC13: 放學後經常在外流連", "CC14: 吸煙", "CC15: 賭博", "CC16: 吸食毒品", "CC17: 色情刊物/資訊", "CC18: 沉迷互聯網", "CC19: 非禮/性侵犯", "CC20: 偷竊", "CC21: 童黨/黑社會", "CC22: 其他（請扼要說明）"],
                "家庭/環境": ["FF1: 缺乏父母恰當的教導和監管", "FF2: 已經證實的虐兒個案", "FF3: 家庭關係的問題", "FF4: 未能適應家庭危機/突變", "FF5: 家庭暴力", "FF6: 其他（請扼要說明）"],  
                "情緒/心理": ["EE1: 畏縮/退避的行為", "EE2: 焦慮問題", "EE3: 情緒問題", "EE4: 身心徵狀的困擾", "EE5: 自毁行為", "EE6: 發展障礙 (經診斷)", "EE7: 懷疑有發展障礙", "EE8: 精神病 (經診斷)", "EE9: 懷疑有精神病", "EE10: 其他（請扼要說明）"],
                "健康/生理": ["HH1: 健康欠佳或經常患病", "HH2: 身體障礙", "HH3: 其他（請扼要說明）"],  
                "社交/發展": ["SS1: 社交技巧不足", "SS2: 與性有關的問題", "SS3: 其他（請扼要說明）"],
                "其他": ["發展性障礙", "特殊教育需要", "其他（請扼要說明）"]
            };

            const form = document.getElementById('case-form');
            const tableBody = document.getElementById('case-table-body');
            const submitBtn = document.getElementById('submit-btn');
            const cancelBtn = document.getElementById('cancel-btn');
            const caseIdInput = document.getElementById('case-id');
            const classFilter = document.getElementById('class-filter');
            const caseworkerFilter = document.getElementById('caseworker-filter');
            
            const dateRangePreset = document.getElementById('date-range-preset');
            const customDateGroup = document.getElementById('custom-date-group');
            const dateStart = document.getElementById('date-start');
            const dateEnd = document.getElementById('date-end');
            const formTitle = document.getElementById('form-title');

            const priCatSelect = document.getElementById('primary-issue-category');
            const priDetSelect = document.getElementById('primary-issue-detail');
            const priOtherInput = document.getElementById('primary-issue-other');
            const secCatSelect = document.getElementById('secondary-issue-category');
            const secDetSelect = document.getElementById('secondary-issue-detail');
            const secOtherInput = document.getElementById('secondary-issue-other');

            let caseworkerChartInstance = null;
            let classChartInstance = null;
            let issueChartInstance = null;
            let currentContext = 'student'; 
            
            const contextConfig = {
                'student': { label: '學生', nameField: '學生姓名', idField: '學生編號', classField: '現時班級', showDOB: true, showStudentId: true },
                'teacher': { label: '老師', nameField: '老師姓名', idField: '', classField: '任教班級/科目', showDOB: false, showStudentId: false },
                'parent':  { label: '家長', nameField: '家長姓名', idField: '', classField: '子弟班級', showDOB: false, showStudentId: false }
            };

            function initIssueDropdowns() {
                const categories = Object.keys(issueData);
                categories.forEach(function(cat) {
                    priCatSelect.innerHTML += '<option value="' + cat + '">' + cat + '</option>';
                    secCatSelect.innerHTML += '<option value="' + cat + '">' + cat + '</option>';
                });
                priCatSelect.addEventListener('change', function() { populateDetails(priCatSelect, priDetSelect, priOtherInput); });
                secCatSelect.addEventListener('change', function() { populateDetails(secCatSelect, secDetSelect, secOtherInput); });
                priDetSelect.addEventListener('change', function() { toggleOtherInput(priDetSelect, priOtherInput); });
                secDetSelect.addEventListener('change', function() { toggleOtherInput(secDetSelect, secOtherInput); });
            }

            function populateDetails(categorySelect, detailSelect, otherInput) {
                const selectedCat = categorySelect.value;
                detailSelect.innerHTML = '<option value="">-- 請選擇細項 --</option>';
                if (selectedCat && selectedCat !== '無') {
                    detailSelect.disabled = false;
                    issueData[selectedCat].forEach(function(item) {
                        detailSelect.innerHTML += '<option value="' + item + '">' + item + '</option>';
                    });
                } else {
                    detailSelect.disabled = true;
                }
                otherInput.style.display = 'none';
                otherInput.required = false;
                otherInput.value = '';
            }

            function toggleOtherInput(detailSelect, otherInput) {
                if (detailSelect.value && detailSelect.value.indexOf('其他') !== -1) {
                    otherInput.style.display = 'block';
                    otherInput.required = true;
                } else {
                    otherInput.style.display = 'none';
                    otherInput.required = false;
                    otherInput.value = '';
                }
            }

            initIssueDropdowns();

            function applyContextUI() {
                try {
                    const config = contextConfig[currentContext];
                    document.getElementById('table-title').textContent = config.label + '記錄總表';
                    document.getElementById('label-name').textContent = config.nameField;
                    document.getElementById('th-name').textContent = config.nameField;
                    document.getElementById('label-class').textContent = config.classField;
                    document.getElementById('th-class').textContent = config.classField;
                    document.getElementById('class-chart-title').textContent = '按' + config.classField + '統計';
                    document.getElementById('filter-class-label').textContent = config.classField + '篩選：';
                    document.getElementById('dob-group').style.display = config.showDOB ? 'flex' : 'none';
                    
                    const displayStyle = config.showStudentId ? '' : 'none';
                    const groupSid = document.getElementById('group-student-id');
                    if(groupSid) groupSid.style.display = displayStyle;
                    const lblSid = document.getElementById('label-student-id');
                    if(lblSid) lblSid.textContent = config.idField;
                    const thSid = document.getElementById('th-student-id');
                    if(thSid) thSid.textContent = config.idField;
                    
                    const studentIdCols = document.querySelectorAll('.col-student-id');
                    for(let i=0; i<studentIdCols.length; i++){
                        studentIdCols[i].style.display = displayStyle;
                    }
                } catch (e) {}
            }

            const menuItems = document.querySelectorAll('.menu-item');
            for(let i=0; i<menuItems.length; i++) {
                menuItems[i].addEventListener('click', function() {
                    for(let j=0; j<menuItems.length; j++){
                        menuItems[j].classList.remove('active');
                    }
                    this.classList.add('active');
                    currentContext = this.getAttribute('data-context');
                    applyContextUI();

                    classFilter.value = '';
                    caseworkerFilter.value = '';
                    dateRangePreset.value = 'all'; 
                    customDateGroup.style.display = 'none';
                    dateStart.value = '';
                    dateEnd.value = '';

                    resetForm(); 
                    updateAll(); 
                });
            }

            // ================= 從 SUPABASE 雲端載入資料 =================
            async function loadDataFromSupabase() {
                if (SUPABASE_URL === 'YOUR_SUPABASE_URL') return; 

                try {
                    const { data, error } = await db.from('cases').select('*');
                    if (error) throw error;

                    tableBody.innerHTML = ''; 
                    data.forEach(function(item) {
                        const d = item.case_data;
                        if (!d || !d.col0) return; // 防呆
                        
                        const row = document.createElement('tr');
                        row.setAttribute('data-case-id', item.case_id);
                        row.setAttribute('data-type', d.type || 'student');
                        row.setAttribute('data-dob', d.dob || '');
                        row.setAttribute('data-pri-cat', d.priCat || '');
                        row.setAttribute('data-pri-det', d.priDet || '');
                        row.setAttribute('data-pri-other', d.priOther || '');
                        row.setAttribute('data-sec-cat', d.secCat || '');
                        row.setAttribute('data-sec-det', d.secDet || '');
                        row.setAttribute('data-sec-other', d.secOther || '');

                        row.innerHTML = 
                            '<td>' + (d.col0||'') + '</td><td class="col-student-id">' + (d.col1||'') + '</td><td>' + (d.col2||'') + '</td><td>' + (d.col3||'') + '</td>' +
                            '<td class="col-date">' + (d.col4||'') + '</td><td>' + (d.col5||'') + '</td><td>' + (d.col6||'') + '</td><td>' + (d.col7||'') + '</td>' +
                            '<td>' + (d.col8||'') + '</td><td>' + (d.col9||'') + '</td><td title="' + (d.col10||'') + '">' + (d.col10||'') + '</td>' +
                            '<td class="no-export"><button class="button edit-btn">編輯</button><button class="button delete-btn">刪除</button></td>';
                        tableBody.appendChild(row);
                    });
                    updateAll();
                } catch (e) {
                    console.error("雲端載入失敗", e);
                }
            }

            // 日期篩選與匯出
            dateRangePreset.addEventListener('change', function() {
                if (this.value === 'custom') {
                    customDateGroup.style.display = 'flex';
                } else {
                    customDateGroup.style.display = 'none';
                    const today = new Date();
                    let start = ''; let end = today.toISOString().slice(0,10);
                    if (this.value === 'last2months') {
                        const twoMonthsAgo = new Date(); twoMonthsAgo.setMonth(today.getMonth() - 2); start = twoMonthsAgo.toISOString().slice(0,10);
                    } else if (this.value === 'thisSchoolYear') {
                        const startYear = today.getMonth() >= 8 ? today.getFullYear() : today.getFullYear() - 1; start = startYear + '-09-01';
                    } else if (this.value === 'thisYear') { start = today.getFullYear() + '-01-01'; }
                    dateStart.value = start; dateEnd.value = end;
                }
                updateAll(); 
            });
            
            dateStart.addEventListener('change', updateAll);
            dateEnd.addEventListener('change', updateAll);

            const exportBtn = document.getElementById('export-excel-btn');
            if(exportBtn) {
                exportBtn.addEventListener('click', function() {
                    const originalTable = document.getElementById('main-data-table');
                    const clonedTable = originalTable.cloneNode(true);
                    
                    const rows = clonedTable.querySelectorAll('tr');
                    for(let i=0; i<rows.length; i++) {
                        const row = rows[i];
                        if (row.style.display === 'none') {
                            row.parentNode.removeChild(row);
                        } else {
                            const cells = row.querySelectorAll('.no-export');
                            for(let j=0; j<cells.length; j++) { cells[j].parentNode.removeChild(cells[j]); }
                            if(currentContext !== 'student') {
                                const studentIdCells = row.querySelectorAll('.col-student-id');
                                for(let j=0; j<studentIdCells.length; j++) { studentIdCells[j].parentNode.removeChild(studentIdCells[j]); }
                            }
                        }
                    }

                    const wb = XLSX.utils.table_to_book(clonedTable, {sheet: "個案列表"});
                    let reportType = "總表";
                    if(dateRangePreset.value === 'last2months') reportType = "雙月報表";
                    else if(dateRangePreset.value === 'thisSchoolYear') reportType = "本學年報表";
                    else if(dateRangePreset.value === 'thisYear') reportType = "年度報表";
                    else if(dateRangePreset.value === 'custom') reportType = dateStart.value + '至' + dateEnd.value;

                    const todayStr = new Date().toISOString().slice(0,10);
                    XLSX.writeFile(wb, contextConfig[currentContext].label + "記錄_" + reportType + "_" + todayStr + ".xlsx");
                });
            }

            form.addEventListener('submit', handleFormSubmit);
            tableBody.addEventListener('click', handleTableClick);
            cancelBtn.addEventListener('click', resetForm);
            classFilter.addEventListener('change', updateAll);
            caseworkerFilter.addEventListener('change', updateAll);

            // ================= 寫入 SUPABASE 雲端 =================
            async function handleFormSubmit(event) {
                event.preventDefault();
                if (SUPABASE_URL === 'YOUR_SUPABASE_URL') {
                    alert('請先在 index.html 填寫您的 Supabase URL 和 Key！');
                    return;
                }
                if (priCatSelect.value && !priDetSelect.value) { alert('請選擇「主要問題」的細項！'); return; }
                if (secCatSelect.value !== '無' && !secDetSelect.value) { alert('請選擇「次要問題」的細項！'); return; }

                let finalCaseworker = document.getElementById('caseworker').value;
                if(currentUser.role === 'caseworker') finalCaseworker = currentUser.name;

                const caseId = caseIdInput.value || Date.now().toString();
                
                let priString = priCatSelect.value;
                if (priDetSelect.value) {
                    let shortDet = priDetSelect.value.split(':')[0]; 
                    if(shortDet === priDetSelect.value) shortDet = priDetSelect.value.split('，')[0]; 
                    priString += ' - ' + shortDet;
                    if (priOtherInput.value) priString += ' (' + priOtherInput.value + ')'; 
                }

                let secString = secCatSelect.value;
                if (secCatSelect.value !== '無' && secDetSelect.value) {
                    let shortDet = secDetSelect.value.split(':')[0];
                    if(shortDet === secDetSelect.value) shortDet = secDetSelect.value.split('，')[0];
                    secString += ' - ' + shortDet;
                    if (secOtherInput.value) secString += ' (' + secOtherInput.value + ')';
                }

                const caseData = {
                    type: currentContext,
                    dob: document.getElementById('dob').value,
                    priCat: priCatSelect.value, priDet: priDetSelect.value, priOther: priOtherInput.value,
                    secCat: secCatSelect.value, secDet: secDetSelect.value, secOther: secOtherInput.value,
                    col0: document.getElementById('student-name').value,
                    col1: currentContext === 'student' ? document.getElementById('student-id').value : '',
                    col2: document.getElementById('record-type').value,
                    col3: document.getElementById('file-number').value,
                    col4: document.getElementById('open-date').value,
                    col5: document.getElementById('gender').options[document.getElementById('gender').selectedIndex].text,
                    col6: document.getElementById('class-current').value,
                    col7: finalCaseworker,
                    col8: priString,
                    col9: secString,
                    col10: document.getElementById('consultation-content').value
                };

                submitBtn.textContent = '儲存至雲端中...';
                submitBtn.disabled = true;

                try {
                    const { error } = await db.from('cases').upsert({ case_id: parseInt(caseId), case_data: caseData });
                    if (error) throw error;
                    alert("儲存成功！");
                    resetForm();
                    await loadDataFromSupabase(); 
                } catch(e) {
                    alert("儲存失敗: " + e.message);
                } finally {
                    submitBtn.textContent = '提交資料';
                    submitBtn.disabled = false;
                    document.querySelector('.table-container').scrollIntoView({ behavior: 'smooth' });
                }
            }

            // ================= 刪除 SUPABASE 雲端 =================
            async function handleTableClick(event) {
                const target = event.target;
                const row = target.closest('tr');
                if (!row) return;

                if (target.classList.contains('delete-btn')) {
                    if (confirm('確定要刪除「' + row.cells[0].textContent + '」的資料嗎？')) {
                        const caseId = row.dataset.caseId;
                        try {
                            const { error } = await db.from('cases').delete().eq('case_id', parseInt(caseId));
                            if (error) throw error;
                            row.remove();
                            updateAll();
                        } catch(e) {
                            alert('刪除失敗: ' + e.message);
                        }
                    }
                }
                if (target.classList.contains('edit-btn')) {
                    switchToEditMode(row);
                }
            }
            
            function updateAll() {
                try { applyFilters(); } catch(e){}
                try { applyContextUI(); } catch(e){}
                try { enforcePermissions(); } catch(e){}
                try { updateFilterOptions(); } catch(e){}
                try { updateStatistics(); } catch(e){ console.error("圖表更新失敗", e); }
            }

            function updateStatistics() {
                if (typeof Chart === 'undefined') return;

                const rows = tableBody.querySelectorAll('tr');
                const caseworkerCounts = {};
                const classCounts = {};
                const issueCounts = {}; 

                for(let i=0; i<rows.length; i++) {
                    const row = rows[i];
                    if (row.style.display !== 'none') {
                        try {
                            const dateStr = row.cells[4] ? row.cells[4].textContent : '';     
                            const className = row.cells[6] ? row.cells[6].textContent : '';   
                            const caseworkerName = row.cells[7] ? row.cells[7].textContent : ''; 
                            const primaryCat = row.dataset.priCat; 

                            let yearMonth = '未知月份';
                            if (dateStr && dateStr.indexOf('-') !== -1) {
                                yearMonth = dateStr.substring(0, 7); 
                            }

                            if (caseworkerName) {
                                const key = yearMonth ? caseworkerName + ' (' + yearMonth + ')' : caseworkerName;
                                caseworkerCounts[key] = (caseworkerCounts[key] || 0) + 1;
                            }

                            if (className) classCounts[className] = (classCounts[className] || 0) + 1;
                            if (primaryCat && primaryCat !== '無' && primaryCat !== 'undefined') { 
                                issueCounts[primaryCat] = (issueCounts[primaryCat] || 0) + 1;
                            }
                        } catch(e) {}
                    }
                }

                try {
                    const unsortedKeys = [];
                    for(let k in caseworkerCounts) unsortedKeys.push(k);
                    
                    const sortedMonthsObj = {};
                    const allCwObj = {};
                    
                    unsortedKeys.forEach(function(k) {
                        const parts = k.split(' (');
                        if(parts.length > 1) {
                            sortedMonthsObj[parts[1].replace(')','')] = true;
                        } else {
                            sortedMonthsObj[k] = true;
                        }
                        allCwObj[parts[0]] = true;
                    });
                    
                    const sortedMonths = Object.keys(sortedMonthsObj).sort();
                    const allCw = Object.keys(allCwObj);
                    const colors = ['rgba(52, 152, 219, 0.8)', 'rgba(231, 76, 60, 0.8)', 'rgba(241, 196, 15, 0.8)', 'rgba(155, 89, 182, 0.8)'];

                    const datasets = allCw.map(function(cw, index) {
                        const dataPoints = sortedMonths.map(function(month) {
                            return caseworkerCounts[cw + ' (' + month + ')'] || 0;
                        });
                        return { label: cw, data: dataPoints, backgroundColor: colors[index % colors.length], borderWidth: 1 };
                    });

                    caseworkerChartInstance = createChartSafely(caseworkerChartInstance, 'caseworkerChart', sortedMonths, datasets);

                    const classLabels = Object.keys(classCounts);
                    const classValues = classLabels.map(function(k){ return classCounts[k]; });
                    const classDataSets = [{ label: '數量', data: classValues, backgroundColor: 'rgba(46, 204, 113, 0.8)', borderWidth: 1 }];
                    classChartInstance = createChartSafely(classChartInstance, 'classChart', classLabels, classDataSets);

                    const issueLabels = Object.keys(issueCounts);
                    const issueValues = issueLabels.map(function(k){ return issueCounts[k]; });
                    const issueDataSets = [{ label: '數量', data: issueValues, backgroundColor: 'rgba(155, 89, 182, 0.8)', borderWidth: 1 }];
                    issueChartInstance = createChartSafely(issueChartInstance, 'issueChart', issueLabels, issueDataSets);

                } catch (error) {
                    console.error("繪製圖表時發生錯誤：", error);
                }
            }

            function createChartSafely(oldInstance, canvasId, labels, datasets) {
                const canvas = document.getElementById(canvasId);
                if (!canvas) return null;
                
                if (oldInstance) { oldInstance.destroy(); }
                const ctx = canvas.getContext('2d');
                return new Chart(ctx, {
                    type: 'bar',
                    data: { labels: labels, datasets: datasets },
                    options: { scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } }, responsive: true, maintainAspectRatio: false }
                });
            }

            function applyFilters() {
                const classValue = classFilter.value;
                const caseworkerValue = caseworkerFilter.value;
                const startDateVal = dateStart.value;
                const endDateVal = dateEnd.value;

                const rows = tableBody.querySelectorAll('tr');
                for(let i=0; i<rows.length; i++){
                    const row = rows[i];
                    try {
                        const rowType = row.getAttribute('data-type');
                        const classMatch = !classValue || (row.cells[6] && row.cells[6].textContent === classValue);
                        const caseworkerMatch = !caseworkerValue || (row.cells[7] && row.cells[7].textContent === caseworkerValue);
                        const typeMatch = rowType === currentContext;
                        
                        let authMatch = true;
                        if (currentUser.role === 'caseworker' && row.cells[7] && row.cells[7].textContent !== currentUser.name) {
                            authMatch = false;
                        }
                        
                        let dateMatch = true;
                        if (dateRangePreset.value !== 'all') {
                            const rowDate = row.cells[4] ? row.cells[4].textContent : '';
                            if (rowDate) {
                                if (startDateVal && rowDate < startDateVal) dateMatch = false;
                                if (endDateVal && rowDate > endDateVal) dateMatch = false;
                            }
                        }
                        
                        row.style.display = (classMatch && caseworkerMatch && typeMatch && dateMatch && authMatch) ? '' : 'none';
                    } catch(e) {
                        row.style.display = 'none';
                    }
                }
            }

            function updateFilterOptions() {
                const classesObj = {};
                const caseworkersObj = {};
                const rows = tableBody.querySelectorAll('tr');
                
                for(let i=0; i<rows.length; i++) {
                    const row = rows[i];
                    if(row.style.display !== 'none'){
                        try { 
                            if(row.cells[6]) classesObj[row.cells[6].textContent] = true; 
                            if(row.cells[7]) caseworkersObj[row.cells[7].textContent] = true; 
                        } catch(e) {}
                    }
                }
                
                const updateSelect = (selectEl, optionsObj, defaultText) => {
                    const currentVal = selectEl.value;
                    let html = '<option value="">' + defaultText + '</option>';
                    for(let k in optionsObj) {
                        if(k) html += '<option value="' + k + '">' + k + '</option>';
                    }
                    selectEl.innerHTML = html;
                    selectEl.value = currentVal;
                };
                updateSelect(classFilter, classesObj, '-- 全部 --');
                if (currentUser.role === 'admin') {
                    updateSelect(caseworkerFilter, caseworkersObj, '-- 所有同工 --');
                }
            }

            function switchToEditMode(row) {
                if(currentUser.role === 'caseworker' && row.cells[7] && row.cells[7].textContent !== currentUser.name) {
                    alert("您沒有權限編輯其他同工的紀錄！"); return;
                }
                caseIdInput.value = row.dataset.caseId;
                
                try {
                    document.getElementById('student-name').value = row.cells[0] ? row.cells[0].textContent : '';
                    document.getElementById('student-id').value = row.cells[1] ? row.cells[1].textContent : ''; 
                    document.getElementById('record-type').value = row.cells[2] ? row.cells[2].textContent : ''; 
                    document.getElementById('file-number').value = row.cells[3] ? row.cells[3].textContent : '';
                    document.getElementById('open-date').value = row.cells[4] ? row.cells[4].textContent : '';
                    document.getElementById('gender').value = (row.cells[5] && row.cells[5].textContent === '男') ? 'male' : 'female';
                    document.getElementById('class-current').value = row.cells[6] ? row.cells[6].textContent : '';
                    document.getElementById('dob').value = row.dataset.dob || '';
                    if(currentUser.role === 'admin') {
                        document.getElementById('caseworker').value = row.cells[7] ? row.cells[7].textContent : '';
                    }
                    document.getElementById('consultation-content').value = row.cells[10] ? row.cells[10].textContent : '';
                } catch(e) {}
                
                priCatSelect.value = row.dataset.priCat || '';
                populateDetails(priCatSelect, priDetSelect, priOtherInput);
                priDetSelect.value = row.dataset.priDet || '';
                priOtherInput.value = row.dataset.priOther || '';
                toggleOtherInput(priDetSelect, priOtherInput);

                secCatSelect.value = row.dataset.secCat || '無';
                populateDetails(secCatSelect, secDetSelect, secOtherInput);
                secDetSelect.value = row.dataset.secDet || '';
                secOtherInput.value = row.dataset.secOther || '';
                toggleOtherInput(secDetSelect, secOtherInput); 

                const config = contextConfig[currentContext];
                formTitle.textContent = '正在編輯：' + (row.cells[0] ? row.cells[0].textContent : '');
                submitBtn.textContent = '更新資料';
                cancelBtn.style.display = 'inline-block';
                
                document.querySelector('.form-container').scrollIntoView({ behavior: 'smooth' });
            }
            
            function resetForm() {
                form.reset();
                caseIdInput.value = '';
                document.getElementById('record-type').value = '諮詢'; 
                
                populateDetails(priCatSelect, priDetSelect, priOtherInput);
                populateDetails(secCatSelect, secDetSelect, secOtherInput);

                const config = contextConfig[currentContext];
                formTitle.textContent = '新增' + config.label + '記錄';
                submitBtn.textContent = '提交資料';
                cancelBtn.style.display = 'none';
                enforcePermissions();
            }
            
            // ================= 頁面啟動 =================
            loadDataFromSupabase(); 
            enforcePermissions(); 
            applyContextUI(); 
        });
    </script>
</body>
</html>
